version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: choir_db
    environment:
      POSTGRES_DB: choir
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d choir" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/minthorst/choir-backend:latest
    build: .
    container_name: choir_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TZ=Europe/Berlin
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/choir
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MEMBER_PASSWORD=${MEMBER_PASSWORD:-member}
      - DOORMAN_PASSWORD=${DOORMAN_PASSWORD:-doorman}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - EMAIL_CHORLEITER=${EMAIL_CHORLEITER}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL:-https://lind-horst.com/nofomo}

  caddy:
    image: ghcr.io/minthorst/choir-frontend:latest
    build: ../choir-vue-frontend
    container_name: choir_caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-lind-horst.com}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config: