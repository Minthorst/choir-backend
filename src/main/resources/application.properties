spring.application.name=Choir Backend
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mail.host=smtp.ionos.de
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL:https://lind-horst.com/nofomo}
app.chorleiter-email=${EMAIL_CHORLEITER}
app.schedule-ics-url=${SCHEDULE_ICS_URL:https://p114-caldav.icloud.com/published/2/MTgzMzA3MDgzMTgzMzA3MMDz90SiYO-cr-IgV82JomEP2fB39FcEpPmM2s_mLQgbU2ee09tmiwliW34_4Qu0Kl37M_Ab5pRtFrGUYcK_0Rc}