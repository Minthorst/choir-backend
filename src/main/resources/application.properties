spring.application.name=Choir Backend
spring.datasource.url=jdbc:postgresql://localhost:5432/choirDB
spring.datasource.username=admin
spring.datasource.password=changeThis

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mail.host=smtp.ionos.de
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL:https://lind-horst.com/nofomo}
app.chorleiter-email=${EMAIL_CHORLEITER}