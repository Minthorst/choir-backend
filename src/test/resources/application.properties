spring.application.name=Choir Backend
spring.datasource.url=jdbc:h2:mem:choir_test;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Mail is never sent in tests; host just needs to resolve lazily.
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=noreply@example.com
spring.mail.password=secret
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=http://localhost/nofomo
app.chorleiter-email=chorleiter@example.com
app.admin-feedback-email=feedback@example.com
app.schedule-ics-url=http://localhost/schedule.ics

MEMBER_PASSWORD=member
DOORMAN_PASSWORD=doorman
ADMIN_PASSWORD=admin
